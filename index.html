<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عداد الامتحانات - الرابع أدبي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --secondary-accent: #818cf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top left, rgba(56, 189, 248, 0.1), transparent);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container { max-width: 850px; width: 100%; text-align: center; }

        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            background: linear-gradient(90deg, var(--accent-color), var(--secondary-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .stat-card p { font-size: 1.5rem; font-weight: bold; color: var(--accent-color); }

        /* العداد التنازلي */
        .countdown-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .countdown-box {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            padding: 20px 10px;
            border-radius: 20px;
            border-bottom: 4px solid var(--accent-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .number { font-size: 2.5rem; font-weight: 800; display: block; }
        .label { font-size: 0.8rem; color: var(--text-muted); }

        /* قسم الطلاب */
        .students-section {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
        }

        .students-title {
            color: var(--secondary-accent);
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        .student-name {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 12px;
            border-radius: 12px;
            font-weight: 500;
            transition: 0.3s;
        }

        .student-name:hover {
            background: var(--accent-color);
            color: #000;
        }

        @media (max-width: 600px) {
            .countdown-container { grid-template-columns: repeat(2, 1fr); }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>العد التنازلي لامتحانات الرابع أدبي</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <h3 style="font-size: 0.9rem; color: var(--text-muted);">المتبقي الكلي</h3>
                <p id="total-days">19 يوم</p>
            </div>
            <div class="stat-card">
                <h3 style="font-size: 0.9rem; color: var(--text-muted);">دوام فعلي (بدون عطل)</h3>
                <p id="work-days">13 يوم</p>
            </div>
        </div>

        <div class="countdown-container">
            <div class="countdown-box"><span class="number" id="days">00</span><span class="label">أيام</span></div>
            <div class="countdown-box"><span class="number" id="hours">00</span><span class="label">ساعات</span></div>
            <div class="countdown-box"><span class="number" id="minutes">00</span><span class="label">دقائق</span></div>
            <div class="countdown-box"><span class="number" id="seconds">00</span><span class="label">ثواني</span></div>
        </div>

        <div class="students-section">
            <h2 class="students-title">نخبة الصف الرابع الأدبي</h2>
            <div class="students-grid">
                <div class="student-name">محمد مجيد</div>
                <div class="student-name">ليث اسامه</div>
                <div class="student-name">عمر محمد</div>
                <div class="student-name">عبدالله احمد</div>
            </div>
        </div>

        <p style="margin-top: 30px; color: var(--text-muted); font-size: 0.8rem;">تاريخ الامتحان المرتقب: 26 / 4 / 2026</p>
    </div>

    <script>
        const examDate = new Date("April 26, 2026 08:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = examDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
            
            // حساب الدوام الفعلي (تقريبي بناءً على الأيام المتبقية)
            document.getElementById("work-days").innerText = calculateWorkDays(new Date(), new Date("2026-04-26")) + " يوم";
        }

        function calculateWorkDays(start, end) {
            let count = 0;
            let cur = new Date(start.getTime());
            while (cur <= end) {
                if (cur.getDay() !== 5 && cur.getDay() !== 6) count++;
                cur.setDate(cur.getDate() + 1);
            }
            return count;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
